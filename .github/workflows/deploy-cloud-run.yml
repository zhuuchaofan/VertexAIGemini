name: Deploy Cloud Run

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      deploy_target:
        description: Service to deploy
        required: true
        default: all
        type: choice
        options:
          - all
          - api
          - web

permissions:
  contents: read
  id-token: write

env:
  DEPLOY_TARGET: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_target || 'all' }}
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION || 'asia-east1' }}
  REPOSITORY: ${{ vars.ARTIFACT_REPOSITORY || 'vertex-ai' }}
  API_SERVICE: ${{ vars.API_SERVICE || 'vertex-ai-api' }}
  WEB_SERVICE: ${{ vars.WEB_SERVICE || 'vertex-ai-web' }}
  WIF_PROVIDER: ${{ vars.WIF_PROVIDER }}
  DEPLOY_SERVICE_ACCOUNT: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}
  RUNTIME_SERVICE_ACCOUNT: ${{ vars.CLOUD_RUN_SERVICE_ACCOUNT }}
  FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID || vars.GCP_PROJECT_ID }}
  FIRESTORE_PROJECT_ID: ${{ vars.FIRESTORE_PROJECT_ID || vars.FIREBASE_PROJECT_ID || vars.GCP_PROJECT_ID }}
  FIREBASE_AUTH_DOMAIN: ${{ vars.FIREBASE_AUTH_DOMAIN }}
  FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
  FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
  DEFAULT_PROVIDER_ID: ${{ vars.DEFAULT_PROVIDER_ID || 'gemini' }}
  ATTACHMENT_STORAGE_BUCKET: ${{ vars.ATTACHMENT_STORAGE_BUCKET || format('{0}-vertex-ai-attachments', vars.GCP_PROJECT_ID) }}
  API_CPU: ${{ vars.API_CPU || '1' }}
  API_MEMORY: ${{ vars.API_MEMORY || '1Gi' }}
  API_CONCURRENCY: ${{ vars.API_CONCURRENCY || '20' }}
  API_TIMEOUT: ${{ vars.API_TIMEOUT || '300s' }}
  API_MIN_INSTANCES: ${{ vars.API_MIN_INSTANCES || '0' }}
  API_MAX_INSTANCES: ${{ vars.API_MAX_INSTANCES || '10' }}
  WEB_CPU: ${{ vars.WEB_CPU || '1' }}
  WEB_MEMORY: ${{ vars.WEB_MEMORY || '512Mi' }}
  WEB_CONCURRENCY: ${{ vars.WEB_CONCURRENCY || '80' }}
  WEB_TIMEOUT: ${{ vars.WEB_TIMEOUT || '60s' }}
  WEB_MIN_INSTANCES: ${{ vars.WEB_MIN_INSTANCES || '0' }}
  WEB_MAX_INSTANCES: ${{ vars.WEB_MAX_INSTANCES || '5' }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore API
        run: dotnet restore VertexAI/VertexAI.csproj

      - name: Restore tests
        run: dotnet restore VertexAI.Tests/VertexAI.Tests.csproj

      - name: Build API
        run: dotnet build VertexAI/VertexAI.csproj --no-restore --disable-build-servers

      - name: Build tests
        run: dotnet build VertexAI.Tests/VertexAI.Tests.csproj --no-restore --disable-build-servers

      - name: Run service tests
        run: dotnet run --project VertexAI.Tests/VertexAI.Tests.csproj --no-build

      - name: Validate deployment configuration
        run: |
          required=(
            PROJECT_ID
            REGION
            REPOSITORY
            API_SERVICE
            WEB_SERVICE
            WIF_PROVIDER
            DEPLOY_SERVICE_ACCOUNT
            RUNTIME_SERVICE_ACCOUNT
            FIREBASE_PROJECT_ID
            FIRESTORE_PROJECT_ID
            FIREBASE_AUTH_DOMAIN
            FIREBASE_API_KEY
            FIREBASE_APP_ID
          )
          for name in "${required[@]}"; do
            if [[ -z "${!name}" ]]; then
              echo "::error::Missing required deployment setting: ${name}"
              exit 1
            fi
          done

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOY_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Ensure Artifact Registry repository
        run: |
          if ! gcloud artifacts repositories describe "${REPOSITORY}" \
            --project="${PROJECT_ID}" \
            --location="${REGION}" >/dev/null 2>&1; then
            gcloud artifacts repositories create "${REPOSITORY}" \
              --project="${PROJECT_ID}" \
              --location="${REGION}" \
              --repository-format=docker \
              --description="Vertex AI workspace containers"
          fi

      - name: Ensure attachment storage bucket
        run: |
          if ! gcloud storage buckets describe "gs://${ATTACHMENT_STORAGE_BUCKET}" >/dev/null 2>&1; then
            gcloud storage buckets create "gs://${ATTACHMENT_STORAGE_BUCKET}" \
              --project="${PROJECT_ID}" \
              --location="${REGION}" \
              --uniform-bucket-level-access
          fi

          gcloud storage buckets add-iam-policy-binding "gs://${ATTACHMENT_STORAGE_BUCKET}" \
            --member="serviceAccount:${RUNTIME_SERVICE_ACCOUNT}" \
            --role="roles/storage.objectUser" >/dev/null

      - name: Build and deploy API
        if: env.DEPLOY_TARGET == 'all' || env.DEPLOY_TARGET == 'api'
        run: |
          api_image="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/vertex-ai-api:${GITHUB_SHA}"

          gcloud builds submit VertexAI \
            --project="${PROJECT_ID}" \
            --tag="${api_image}"

          gcloud run deploy "${API_SERVICE}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --image="${api_image}" \
            --service-account="${RUNTIME_SERVICE_ACCOUNT}" \
            --allow-unauthenticated \
            --port=8080 \
            --cpu="${API_CPU}" \
            --memory="${API_MEMORY}" \
            --concurrency="${API_CONCURRENCY}" \
            --timeout="${API_TIMEOUT}" \
            --min-instances="${API_MIN_INSTANCES}" \
            --max-instances="${API_MAX_INSTANCES}" \
            --set-env-vars="PROJECT_ID=${PROJECT_ID},VertexAI__ProjectId=${PROJECT_ID},FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID},FIRESTORE_PROJECT_ID=${FIRESTORE_PROJECT_ID},Firebase__ProjectId=${FIREBASE_PROJECT_ID},Firebase__ApiKey=${FIREBASE_API_KEY},Firebase__AuthDomain=${FIREBASE_AUTH_DOMAIN},Firebase__AppId=${FIREBASE_APP_ID},Workspace__DefaultProviderId=${DEFAULT_PROVIDER_ID},ATTACHMENT_STORAGE_BUCKET=${ATTACHMENT_STORAGE_BUCKET},Persistence__AttachmentStorageBucket=${ATTACHMENT_STORAGE_BUCKET}"

      - name: Resolve API URL
        id: api
        run: |
          api_url="$(gcloud run services describe "${API_SERVICE}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --format='value(status.url)')"
          echo "url=${api_url}" >> "${GITHUB_OUTPUT}"

      - name: Build and deploy web
        if: env.DEPLOY_TARGET == 'all' || env.DEPLOY_TARGET == 'web'
        run: |
          web_image="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/vertex-ai-web:${GITHUB_SHA}"

          gcloud builds submit apps/web \
            --project="${PROJECT_ID}" \
            --tag="${web_image}"

          gcloud run deploy "${WEB_SERVICE}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --image="${web_image}" \
            --allow-unauthenticated \
            --port=8080 \
            --cpu="${WEB_CPU}" \
            --memory="${WEB_MEMORY}" \
            --concurrency="${WEB_CONCURRENCY}" \
            --timeout="${WEB_TIMEOUT}" \
            --min-instances="${WEB_MIN_INSTANCES}" \
            --max-instances="${WEB_MAX_INSTANCES}" \
            --set-env-vars="BACKEND_URL=${{ steps.api.outputs.url }}"

      - name: Smoke check API
        run: |
          curl -fsS "${{ steps.api.outputs.url }}/health/live"
          curl -fsS "${{ steps.api.outputs.url }}/health/ready"
