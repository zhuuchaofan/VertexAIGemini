name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore VertexAI.slnx

      - name: Build
        run: dotnet build VertexAI.slnx --no-restore

      - name: Run service tests
        run: dotnet run --project VertexAI.Tests/VertexAI.Tests.csproj --no-restore
