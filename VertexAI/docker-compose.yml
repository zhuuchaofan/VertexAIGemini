services:
  # === AI Workspace API ===
  app:
    build: .
    container_name: vertex-ai-api
    restart: unless-stopped
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/app/credentials.json
      - PROJECT_ID=${PROJECT_ID:-}
      - VertexAI__ProjectId=${PROJECT_ID:-}
      - Firebase__ProjectId=${FIREBASE_PROJECT_ID:-}
      - Firebase__ApiKey=${FIREBASE_API_KEY:-}
      - Firebase__AuthDomain=${FIREBASE_AUTH_DOMAIN:-}
      - Firebase__AppId=${FIREBASE_APP_ID:-}
      - Persistence__FirestoreProjectId=${FIRESTORE_PROJECT_ID:-}
      - Workspace__DefaultProviderId=${DEFAULT_PROVIDER_ID:-gemini}
      - OpenAICompatible__Enabled=${OPENAI_COMPATIBLE_ENABLED:-false}
      - OpenAICompatible__Endpoint=${OPENAI_COMPATIBLE_ENDPOINT:-https://api.openai.com/v1/chat/completions}
      - OpenAICompatible__ApiKey=${OPENAI_COMPATIBLE_API_KEY:-}
      - OpenAICompatible__ModelName=${OPENAI_COMPATIBLE_MODEL:-gpt-4.1-mini}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - MOONSHOT_API_KEY=${MOONSHOT_API_KEY:-}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-}
      - ZHIPU_API_KEY=${ZHIPU_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - XIAOMI_MIMO_API_KEY=${XIAOMI_MIMO_API_KEY:-}
      - APP_BASE_URL=${APP_BASE_URL:-http://localhost:8880}
    volumes:
      - ${GCP_KEY_PATH:-./GCPKey/credentials.json}:/app/credentials.json:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8880/health/live || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # === Standalone frontend workspace ===
  web:
    build:
      context: ../apps/web
    container_name: vertex-ai-web
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    environment:
      - BACKEND_URL=http://app:8880
      - HOST=0.0.0.0
      - PORT=5173
    ports:
      - "${WEB_PORT:-8880}:5173"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5173/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
