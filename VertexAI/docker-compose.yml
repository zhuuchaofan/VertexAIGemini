services:
  # === 数据库服务 (PostgreSQL) ===
  db:
    image: postgres:15-alpine
    container_name: gemini-db
    restart: always
    environment:
      POSTGRES_USER: gemini_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-GeminiChat2024!}
      POSTGRES_DB: gemini_chat
      TZ: Asia/Shanghai
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gemini_admin -d gemini_chat"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5454:5432"

  # === AI Workspace API / legacy Blazor host ===
  app:
    build: .
    container_name: vertex-ai-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/app/credentials.json
      - VertexAI__ProjectId=${PROJECT_ID:-}
      - ConnectionStrings__Default=Host=db;Port=5432;Database=gemini_chat;Username=gemini_admin;Password=${DB_PASSWORD:-GeminiChat2024!}
      - Workspace__EnableLegacyBlazor=false
      - Workspace__DefaultProviderId=${DEFAULT_PROVIDER_ID:-gemini}
      - OpenAICompatible__Enabled=${OPENAI_COMPATIBLE_ENABLED:-false}
      - OpenAICompatible__Endpoint=${OPENAI_COMPATIBLE_ENDPOINT:-https://api.openai.com/v1/chat/completions}
      - OpenAICompatible__ApiKey=${OPENAI_COMPATIBLE_API_KEY:-}
      - OpenAICompatible__ModelName=${OPENAI_COMPATIBLE_MODEL:-gpt-4.1-mini}
      - APP_BASE_URL=${APP_BASE_URL:-http://localhost:8880}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
    volumes:
      - ${GCP_KEY_PATH:-./GCPKey/credentials.json}:/app/credentials.json:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8880/health/live || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # === Standalone frontend workspace ===
  web:
    build:
      context: ../apps/web
    container_name: vertex-ai-web
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    environment:
      - BACKEND_URL=http://app:8880
      - HOST=0.0.0.0
      - PORT=5173
    ports:
      - "${WEB_PORT:-8880}:5173"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5173/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  pg_data:
